server {
    listen 80;
    server_name localhost;

    # Re-resolve Docker service names every 30s instead of caching at startup
    resolver 127.0.0.11 valid=30s;
    resolver_timeout 5s;

    set $frontend http://web:5173;
    set $backend  http://api:8000;

    client_max_body_size 20m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # API — proxy_pass without path so nginx forwards the original URI as-is
    location /v1/ {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /health {
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    location /docs {
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    # Vite HMR WebSocket
    location /@vite/ {
        proxy_pass $frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /@fs/ {
        proxy_pass $frontend;
        proxy_set_header Host $host;
    }

    location /src/ {
        proxy_pass $frontend;
        proxy_set_header Host $host;
    }

    location /node_modules/ {
        proxy_pass $frontend;
        proxy_set_header Host $host;
    }

    # Frontend — tudo o resto
    location / {
        proxy_pass $frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
